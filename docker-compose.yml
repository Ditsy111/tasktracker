services:

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root2026

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d tasktracker" ]
      interval: 10s
      timeout: 5s
      retries: 5

    ports:
      - "5432:5432"

  app:
    build: .

    environment:
      DB_URL: jdbc:postgresql://db:5432/tasktracker
      DB_USER: postgres
      DB_PASSWORD: root2026

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy